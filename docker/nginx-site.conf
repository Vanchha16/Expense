server {
    # NGINX_PORT is replaced at container startup by entrypoint.sh
    listen NGINX_PORT default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    charset utf-8;

    # ── Force HTTPS ───────────────────────────────────────────────
    # Render terminates SSL at its load balancer and forwards requests
    # internally over HTTP, setting X-Forwarded-Proto: https.
    # This redirect ensures anyone hitting plain http:// gets sent to https://.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Laravel front-controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    60;
        fastcgi_connect_timeout 10;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_hide_header     X-Powered-By;
    }

    # Block dot-file access
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
